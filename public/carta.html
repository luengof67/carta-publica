<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra carta</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap');
:root{
  --crema:#F7F1E7; --crema-2:#FBF6EE; --tinta:#3A2A20; --teja:#B4552D; --teja-osc:#8F3F1E;
  --tierra:#7A5C3E; --dorado:#C8893B; --linea:#E6DAC8; --carta:#FFFFFF; --suave:#8A7357;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--crema);color:var(--tinta);min-height:100vh;}
.display{font-family:'Fraunces',Georgia,serif;}
header{background:linear-gradient(160deg,#8F3F1E,#B4552D);color:#fff;padding:30px 20px 26px;text-align:center;}
header .logo{max-height:96px;max-width:78%;object-fit:contain;margin-bottom:6px;
  background:#fff;padding:12px 18px;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.18);}
header h1{font-family:'Fraunces',Georgia,serif;font-size:30px;font-weight:700;margin:10px 0 0;}
header .sub{font-size:13.5px;opacity:.9;margin-top:5px;letter-spacing:.02em;}
main{max-width:860px;margin:0 auto;padding:14px 16px 50px;}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:12px 0 8px;position:sticky;top:0;background:var(--crema);z-index:5;}
.tab{border:none;background:#fff;padding:9px 15px;border-radius:999px;font-weight:600;font-size:14px;
  cursor:pointer;color:var(--tierra);white-space:nowrap;font-family:inherit;border:1px solid var(--linea);}
.tab.activa{background:var(--teja);color:#fff;border-color:var(--teja);}
.buscador{width:100%;border:1.5px solid var(--linea);border-radius:12px;padding:12px 14px;font-size:15px;
  margin:6px 0 4px;font-family:inherit;outline:none;background:#fff;}
.buscador:focus{border-color:var(--teja);}
.filtro-al{margin:8px 0 2px;}
.filtro-al select{width:100%;border:1.5px solid var(--linea);border-radius:12px;padding:11px 12px;font-size:14px;
  font-family:inherit;background:#fff;color:var(--tinta);outline:none;}
.aviso-filtro{font-size:13px;color:var(--suave);margin:4px 2px 0;}
.grupo-sec{margin-top:28px;}
.grupo-sec h2{font-family:'Fraunces',Georgia,serif;font-size:16px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--teja);text-align:center;margin:0 0 4px;}
.grupo-sec h2::after{content:"";display:block;width:44px;height:3px;background:var(--dorado);margin:9px auto 18px;border-radius:2px;}
/* Estilo carta elegante: texto a la izquierda, foto pequena a la derecha */
.plato{background:transparent;border:none;border-bottom:1px solid var(--linea);border-radius:0;margin:0;
  padding:16px 2px;display:flex;align-items:flex-start;gap:16px;box-shadow:none;}
.plato .texto{flex:1;min-width:0;}
.plato .nombre{font-family:'Fraunces',Georgia,serif;font-size:17px;font-weight:600;letter-spacing:.02em;
  text-transform:uppercase;display:inline-block;border-bottom:1px solid #D9CBB6;padding-bottom:2px;line-height:1.3;}
.plato .en{font-size:12.5px;color:var(--suave);font-style:italic;margin-top:3px;}
.plato .desc{font-size:13px;color:var(--tierra);margin-top:5px;line-height:1.45;}
.plato .fila-baja{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;margin-top:9px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{width:24px;height:24px;border-radius:50%;background:#F4E6D4;border:1px solid #E4CBA8;
  display:inline-flex;align-items:center;justify-content:center;font-size:13px;padding:0;}
.chip.ok{width:auto;height:auto;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:600;
  background:#E7EFE0;border-color:#CADBBA;color:#4F6B33;}
.plato .precio{font-family:'Fraunces',Georgia,serif;font-size:17px;font-weight:700;color:var(--teja);white-space:nowrap;}
.plato .foto-mini{width:96px;height:96px;flex-shrink:0;border-radius:10px;background:#151515;overflow:hidden;
  display:flex;align-items:center;justify-content:center;}
.plato .foto-mini img{max-width:100%;max-height:100%;object-fit:contain;}
/* Plato destacado: foto grande a lo ancho */
.plato.destacado{flex-direction:column;gap:0;}
.plato.destacado .foto-grande{width:100%;height:240px;background:#151515;border-radius:12px;overflow:hidden;
  margin-bottom:12px;display:flex;align-items:center;justify-content:center;}
.plato.destacado .foto-grande img{max-width:100%;max-height:100%;object-fit:contain;}
.plato.destacado .texto{width:100%;}
.plato.sin-foto-plato{}
.cargando, .vacio{text-align:center;color:var(--suave);padding:50px 20px;font-size:15px;}
.pie{text-align:center;font-size:12.5px;color:var(--suave);margin-top:34px;padding-top:18px;border-top:1px solid var(--linea);line-height:1.6;}
.leyenda-final{margin-top:26px;background:#fff;border:1px solid var(--linea);border-radius:14px;padding:16px 18px;}
.leyenda-final .t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--suave);margin-bottom:10px;}
.leyenda-final .items{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px 12px;font-size:13px;}

/* Modal de detalle al tocar un plato */
.plato{cursor:pointer;}
.velo{position:fixed;inset:0;background:rgba(58,42,32,.55);z-index:50;display:flex;
  align-items:center;justify-content:center;padding:16px;}
.modal-detalle{background:#fff;border-radius:18px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-detalle .foto-top{width:100%;height:220px;background:#151515;display:flex;align-items:center;justify-content:center;}
.modal-detalle .foto-top img{max-width:100%;max-height:100%;object-fit:contain;}
.modal-detalle .md-cuerpo{padding:20px 22px 22px;}
.modal-detalle .md-nombre{font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:700;line-height:1.2;}
.modal-detalle .md-en{font-size:13px;color:var(--suave);font-style:italic;margin-top:3px;}
.modal-detalle .md-precio{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:700;color:var(--teja);margin-top:8px;}
.modal-detalle .md-tit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--suave);margin:18px 0 6px;}
.modal-detalle .md-desc{font-size:14px;color:var(--tierra);line-height:1.5;}
.modal-detalle .md-alergenos{display:flex;flex-wrap:wrap;gap:6px;}
.modal-detalle .md-al{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;padding:4px 11px;
  border-radius:999px;background:#F4E6D4;border:1px solid #E4CBA8;color:#8A5A22;}
.modal-detalle .md-al.ok{background:#E7EFE0;border-color:#CADBBA;color:#4F6B33;}
.modal-detalle .md-cerrar{width:100%;margin-top:20px;background:var(--teja);color:#fff;border:none;
  border-radius:12px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<header>
  <div id="cabecera">
    <h1 class="display">Nuestra carta</h1>
    <div class="sub">Consulta nuestros platos y sus alérgenos</div>
  </div>
</header>

<main>
  <div id="contenido"><div class="cargando">Cargando la carta…</div></div>
</main>
<div id="capaModal"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBNSmPNSufNRs_pQlcZBzGESSsAhTq5cX4",
  authDomain: "listadiplatos.firebaseapp.com",
  projectId: "listadiplatos",
  storageBucket: "listadiplatos.firebasestorage.app",
  messagingSenderId: "979755835088",
  appId: "1:979755835088:web:b411d4efa32170ae72c8d5"
};
const CODIGO_EQUIPO = "jose403060";

const SECCIONES = [
  { id:"menu", nombre:"Menú del día", sub:[
    {id:"primeros",nombre:"Primeros"},{id:"segundos",nombre:"Segundos"},{id:"postres_menu",nombre:"Postres"}]},
  { id:"carta", nombre:"Carta", sub:[
    {id:"entrantes",nombre:"Entrantes"},{id:"carnes",nombre:"Carnes"},{id:"pescados",nombre:"Pescados"},{id:"postres_esp",nombre:"Postres especiales"}]},
  { id:"tapas", nombre:"Tapas", sub:[
    {id:"tapas_barra",nombre:"Tapas de barra"},{id:"tapas_esp",nombre:"Tapas especiales"}]},
  { id:"experiencias", nombre:"Experiencias", sub:[
    {id:"menus_esp",nombre:"Menús especiales"},{id:"catas",nombre:"Catas maridadas"},{id:"cocteles",nombre:"Cócteles"}]},
  { id:"cafeteria", nombre:"Cafetería", sub:[
    {id:"desayunos",nombre:"Desayunos"},{id:"bocadillos",nombre:"Bocadillos"},{id:"raciones",nombre:"Raciones"},{id:"postres_cafe",nombre:"Postres"},{id:"bebidas",nombre:"Bebidas"}]},
];
const SUB_A_PRINCIPAL = {}, NOMBRE_SUB = {};
SECCIONES.forEach(s => s.sub.forEach(sub => { SUB_A_PRINCIPAL[sub.id]=s; NOMBRE_SUB[sub.id]=sub.nombre; }));

const ALERGENOS = [
  {id:"gluten",nombre:"Gluten",icono:"🌾"},{id:"crustaceos",nombre:"Crustáceos",icono:"🦐"},
  {id:"huevos",nombre:"Huevos",icono:"🥚"},{id:"pescado",nombre:"Pescado",icono:"🐟"},
  {id:"cacahuetes",nombre:"Cacahuetes",icono:"🥜"},{id:"soja",nombre:"Soja",icono:"🫘"},
  {id:"lacteos",nombre:"Lácteos",icono:"🥛"},{id:"frutos_cascara",nombre:"Frutos de cáscara",icono:"🌰"},
  {id:"apio",nombre:"Apio",icono:"🥬"},{id:"mostaza",nombre:"Mostaza",icono:"🟡"},
  {id:"sesamo",nombre:"Sésamo",icono:"⚪"},{id:"sulfitos",nombre:"Sulfitos",icono:"🍷"},
  {id:"altramuces",nombre:"Altramuces",icono:"🫛"},{id:"moluscos",nombre:"Moluscos",icono:"🦪"},
];
const AL_MAP = Object.fromEntries(ALERGENOS.map(a => [a.id, a]));
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

let platos = [], fotos = {}, seccion = "todas", busqueda = "", filtroAl = "", logoCarta = "";

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const base = "restaurantes/" + CODIGO_EQUIPO;

onSnapshot(doc(db, base + "/datos/platos"), snap => {
  if (snap.exists()){ try { platos = JSON.parse(snap.data().json || "[]"); } catch { platos = []; } }
  else platos = [];
  render();
}, () => {
  document.getElementById("contenido").innerHTML = `<div class="vacio">No se pudo cargar la carta. Inténtalo más tarde.</div>`;
});

getDocs(collection(db, base + "/fotos")).then(qs => {
  qs.forEach(d => { const data = d.data()?.data; if (data) fotos[d.id] = data; });
  render();
}).catch(()=>{});

/* Logo y nombre del restaurante */
onSnapshot(doc(db, base + "/config/carta"), snap => {
  if (snap.exists()){
    const c = snap.data();
    logoCarta = c.logo || "";
    const cab = document.getElementById("cabecera");
    cab.innerHTML = (logoCarta ? `<img class="logo" src="${logoCarta}" alt="">` : "") +
      `<h1 class="display">${c.marca ? esc(c.marca) : "Nuestra carta"}</h1>
       <div class="sub">Consulta nuestros platos y sus alérgenos</div>`;
  }
}, ()=>{});

function seccionesConPlatos(){
  return SECCIONES.filter(s => platos.some(p => p.publico && SUB_A_PRINCIPAL[p.subseccion]?.id === s.id));
}
function platosFiltrados(){
  return platos.filter(p => {
    if (!p.publico) return false;
    if (seccion !== "todas" && SUB_A_PRINCIPAL[p.subseccion]?.id !== seccion) return false;
    if (filtroAl && (p.alergenos||[]).includes(filtroAl)) return false;
    if (busqueda){
      const t = (p.nombre + " " + (p.nombreEn||"") + " " + (p.ingredientes||[]).join(" ")).toLowerCase();
      if (!t.includes(busqueda.toLowerCase())) return false;
    }
    return true;
  });
}
function chips(p){
  const al = p.alergenos || [];
  if (al.length === 0) return `<span class="chip ok">✓ Sin alérgenos</span>`;
  return al.map(a => AL_MAP[a] ? `<span class="chip" title="${esc(AL_MAP[a].nombre)}">${AL_MAP[a].icono}</span>` : "").join("");
}

function render(){
  const cont = document.getElementById("contenido");
  const hayPublicos = platos.some(p => p.publico);
  if (platos.length === 0 || !hayPublicos){
    cont.innerHTML = `<div class="vacio">La carta se está actualizando. Vuelve en un momento.</div>`;
    return;
  }
  const secs = seccionesConPlatos();
  const tabs = `<div class="tabs">
    <button class="tab${seccion==="todas"?" activa":""}" data-sec="todas">Todo</button>
    ${secs.map(s => `<button class="tab${seccion===s.id?" activa":""}" data-sec="${s.id}">${esc(s.nombre)}</button>`).join("")}
  </div>`;
  const controles = `
    <input class="buscador" id="busc" placeholder="🔎 Buscar plato o ingrediente…" value="${esc(busqueda)}">
    <div class="filtro-al">
      <select id="filAl">
        <option value="">Ver todos los platos</option>
        ${ALERGENOS.map(a => `<option value="${a.id}"${filtroAl===a.id?" selected":""}>Mostrar solo SIN ${esc(a.nombre.toLowerCase())}</option>`).join("")}
      </select>
    </div>
    ${filtroAl ? `<div class="aviso-filtro">Mostrando solo platos <b>sin ${esc(AL_MAP[filtroAl].nombre.toLowerCase())}</b>.</div>` : ""}`;

  const vis = platosFiltrados();
  const usados = new Set();
  let cuerpo = "";
  const secsMostrar = seccion === "todas" ? secs : secs.filter(s => s.id === seccion);
  secsMostrar.forEach(s => {
    s.sub.forEach(sub => {
      const dePlatos = vis.filter(p => p.subseccion === sub.id);
      if (dePlatos.length === 0) return;
      cuerpo += `<div class="grupo-sec"><h2>${esc(s.nombre)} · ${esc(sub.nombre)}</h2>`;
      dePlatos.forEach(p => {
        (p.alergenos||[]).forEach(a => usados.add(a));
        const tieneFoto = !!fotos[p.id];
        const bloqueTexto = `<div class="texto">
            <div class="nombre">${esc(p.nombre)}</div>
            ${p.nombreEn ? `<div class="en">${esc(p.nombreEn)}</div>` : ""}
            ${p.descripcion ? `<div class="desc">${esc(p.descripcion)}</div>` : ""}
            <div class="fila-baja"><div class="chips">${chips(p)}</div>${p.precio ? `<div class="precio">${esc(p.precio)}</div>` : ""}</div>
          </div>`;
        if (p.destacado && tieneFoto){
          cuerpo += `<div class="plato destacado" data-id="${p.id}">
            <div class="foto-grande"><img src="${fotos[p.id]}" alt=""></div>
            ${bloqueTexto}
          </div>`;
        } else {
          cuerpo += `<div class="plato${tieneFoto ? "" : " sin-foto-plato"}" data-id="${p.id}">
            ${bloqueTexto}
            ${tieneFoto ? `<div class="foto-mini"><img src="${fotos[p.id]}" alt=""></div>` : ""}
          </div>`;
        }
      });
      cuerpo += `</div>`;
    });
  });
  if (!cuerpo) cuerpo = `<div class="vacio">Ningún plato coincide con la búsqueda.</div>`;

  const leyenda = usados.size ? `<div class="leyenda-final">
    <div class="t">Alérgenos (Reglamento UE 1169/2011)</div>
    <div class="items">${[...usados].map(a => AL_MAP[a] ? `<div>${AL_MAP[a].icono} ${esc(AL_MAP[a].nombre)}</div>` : "").join("")}</div>
  </div>` : "";

  cont.innerHTML = tabs + controles + cuerpo + leyenda +
    `<div class="pie">La información sobre alérgenos es orientativa. Si tiene alguna alergia o intolerancia, consulte a nuestro personal antes de pedir.</div>`;

  document.querySelectorAll(".tab").forEach(b => b.onclick = () => { seccion = b.dataset.sec; render(); });
  const busc = document.getElementById("busc");
  busc.oninput = () => { busqueda = busc.value; render(); setTimeout(()=>{ const el=document.getElementById("busc"); if(el){el.focus(); el.setSelectionRange(el.value.length,el.value.length);} },0); };
  document.getElementById("filAl").onchange = e => { filtroAl = e.target.value; render(); };
  document.querySelectorAll(".plato[data-id]").forEach(el => el.onclick = () => abrirDetalle(el.dataset.id));
}

function abrirDetalle(id){
  const p = platos.find(x => x.id === id); if (!p) return;
  const foto = fotos[id];
  const al = p.alergenos || [];
  const alergenosHtml = al.length === 0
    ? `<span class="md-al ok">✓ Sin alérgenos declarados</span>`
    : al.map(a => AL_MAP[a] ? `<span class="md-al">${AL_MAP[a].icono} ${esc(AL_MAP[a].nombre)}</span>` : "").join("");
  const capa = document.getElementById("capaModal");
  capa.innerHTML = `<div class="velo" id="veloDet">
    <div class="modal-detalle" onclick="event.stopPropagation()">
      ${foto ? `<div class="foto-top"><img src="${foto}" alt=""></div>` : ""}
      <div class="md-cuerpo">
        <div class="md-nombre">${esc(p.nombre)}</div>
        ${p.nombreEn ? `<div class="md-en">${esc(p.nombreEn)}</div>` : ""}
        ${p.precio ? `<div class="md-precio">${esc(p.precio)}</div>` : ""}
        ${p.descripcion ? `<div class="md-tit">Descripción</div><div class="md-desc">${esc(p.descripcion)}</div>` : ""}
        ${(p.ingredientes && p.ingredientes.length) ? `<div class="md-tit">Ingredientes</div><div class="md-desc">${esc(p.ingredientes.join(", "))}</div>` : ""}
        <div class="md-tit">Alérgenos</div>
        <div class="md-alergenos">${alergenosHtml}</div>
        <button class="md-cerrar" id="detCerrar">Cerrar</button>
      </div>
    </div>
  </div>`;
  document.getElementById("veloDet").onclick = () => capa.innerHTML = "";
  document.getElementById("detCerrar").onclick = () => capa.innerHTML = "";
}
</script>
</body>
</html>
