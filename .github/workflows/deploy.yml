name: Publicar carta pública

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Publicar en Firebase Hosting
        run: firebase deploy --only hosting --project listadiplatos --token "${{ secrets.FIREBASE_TOKEN }}"
